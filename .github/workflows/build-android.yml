name: Build Android APK
on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - 'src/**'
      - 'functions/**'
      - 'public/**'
      - 'wrangler.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'package.json' # We still need this for dependencies, but we'll ignore it if ONLY version changes later if possible.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: bun install

      - name: Build Web Assets (Next.js Export)
        run: bun run build

      - name: Capacitor Sync
        run: bunx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk